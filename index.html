<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSQ Elite | Advanced System Overseer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Monaco Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
</head>
<body>
    <!-- Particle Background -->
    <canvas id="particles"></canvas>
    <div id="bg-wrap"></div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stats-item">
            <span class="stats-icon">👁️</span>
            <span class="stats-label">Views:</span>
            <span class="stats-value" id="viewCount">0</span>
        </div>
        <div class="stats-item">
            <span class="stats-icon">⚡</span>
            <span class="stats-label">Live Active:</span>
            <span class="stats-value" id="activeCount">0</span>
        </div>
        <div class="stats-item">
            <span class="stats-icon">🔑</span>
            <span class="stats-label">Live Keys:</span>
            <span class="stats-value" id="liveKeyCount">0</span>
        </div>
        <div class="stats-item">
            <span class="stats-icon">🎮</span>
            <span class="stats-label">Games:</span>
            <span class="stats-value" id="gameCount">0</span>
        </div>
        <div class="stats-item">
            <span class="stats-icon">🕒</span>
            <span class="stats-label" id="currentTime">00:00</span>
        </div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status connected" id="connectionStatus">
        <div class="status-dot"></div>
        <span>Connected</span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner-large"></div>
        <div class="loading-text" id="loadingText">Loading...</div>
    </div>

    <!-- Notification System -->
    <div id="notification-toggle" onclick="window.toggleNotificationCenter()">
        <svg viewBox="0 0 24 24">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <div id="notificationBadge" class="hidden">0</div>
    </div>

    <div id="notificationCenter" class="hidden">
        <div class="notification-header">
            <h3>🔔 Notifications</h3>
            <div class="notification-actions">
                <button class="mini success" onclick="window.markAllNotificationsRead()">✓ Mark all read</button>
                <button class="mini" onclick="window.toggleNotificationCenter()">✕</button>
            </div>
        </div>
        <div id="notificationsList"></div>
    </div>

    <!-- Auth Panel -->
    <div id="authPanel" class="panel animate-fade">
        <div style="text-align:center; margin-bottom:30px;">
            <h1 style="margin:0; font-size:32px;" class="gradient-text">RSQ GATE</h1>
            <p style="font-size:12px; opacity:0.7; margin-top:8px;">Advanced Secure Access System</p>
        </div>
        
        <div id="loginView">
            <input id="l-user" placeholder="Username" autocomplete="username">
            <input id="l-pass" type="password" placeholder="Password" autocomplete="current-password">
            <button onclick="window.handleAuth('login')">
                <span>Sign In</span>
                <span class="spinner" style="display:none; margin-left:10px;" id="loginSpinner"></span>
            </button>
            <p style="text-align:center; font-size:12px; margin-top:20px; opacity:0.7;">
                New here? <a href="#" onclick="window.toggleAuth(true)" style="color:var(--secondary); text-decoration:none; font-weight:600;">Create Account</a>
            </p>
        </div>
        
        <div id="signupView" class="hidden">
            <input id="s-user" placeholder="Choose Username" autocomplete="username">
            <input id="s-pass" type="password" placeholder="Choose Password" autocomplete="new-password">
            <button onclick="window.handleAuth('signup')">
                <span>Sign Up</span>
                <span class="spinner" style="display:none; margin-left:10px;" id="signupSpinner"></span>
            </button>
            <p style="text-align:center; font-size:12px; margin-top:20px; opacity:0.7;">
                Have account? <a href="#" onclick="window.toggleAuth(false)" style="color:var(--secondary); text-decoration:none; font-weight:600;">Sign In</a>
            </p>
        </div>
        
        <div id="authStatus" style="text-align:center; color:var(--danger); font-size:12px; margin-top:15px; min-height:18px;"></div>
    </div>

    <!-- User Role & Verification Display -->
    <div id="roleDisplay" class="role-display hidden">
        <div class="role-badge" id="userRoleBadge">Unverified</div>
        <div class="verification-progress" id="verificationProgress"></div>
    </div>

    <!-- Main System -->
    <div id="mainSystem" class="hidden">
        <!-- Games Browser View -->
        <div id="gamesBrowserView" class="games-browser-container">
            <div class="games-browser-header">
                <h2 class="gradient-text">🎮 Game Hub</h2>
                <div class="header-actions">
                    <button class="success" onclick="window.toggleFeedbackUI(true)">💬 Feedback</button>
                    <button class="warning" onclick="window.logout()">🚪 Logout</button>
                </div>
            </div>
            
            <div class="games-grid" id="gamesGrid">
                <!-- Games will be loaded here -->
            </div>
        </div>

        <!-- Game Detail View -->
        <div id="gameDetailView" class="game-detail-container hidden">
            <div class="back-nav" onclick="window.showGamesBrowser()">
                <span class="icon">←</span>
                <span>Back to Games</span>
            </div>
            
            <div id="gameDetailContent">
                <!-- Dynamic content -->
            </div>
        </div>

        <!-- Script Editor Modal -->
        <div id="scriptEditorModal" class="modal-overlay hidden">
            <div class="modal-content script-editor-modal">
                <div class="modal-header">
                    <h3>📝 Script Editor</h3>
                    <button onclick="window.closeScriptEditor()" class="close-btn">✕</button>
                </div>
                
                <div class="script-type-selector">
                    <button class="type-btn active" onclick="window.setScriptType('link')">🔗 Link</button>
                    <button class="type-btn" onclick="window.setScriptType('editor')">📝 Lua Editor</button>
                </div>
                
                <div id="scriptLinkInput">
                    <input type="text" id="scriptName" placeholder="Script Name">
                    <input type="url" id="scriptUrl" placeholder="Script URL (https://...)">
                    <div class="obfuscation-options">
                        <label>
                            <input type="checkbox" id="enableObfuscation"> Enable Auto-Obfuscation
                        </label>
                        <select id="obfuscationLevel">
                            <option value="low">Low (Fast)</option>
                            <option value="medium" selected>Medium (Balanced)</option>
                            <option value="high">High (Maximum)</option>
                        </select>
                    </div>
                </div>
                
                <div id="scriptEditorContainer" class="hidden">
                    <div id="monacoEditor" style="height: 400px; border: 1px solid var(--border);"></div>
                    <div class="editor-toolbar">
                        <button onclick="window.formatCode()">🎨 Format</button>
                        <button onclick="window.obfuscateCode()">🔒 Obfuscate</button>
                        <button onclick="window.testScript()">🧪 Test</button>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button class="success" onclick="window.saveScript()">💾 Save Script</button>
                    <button onclick="window.closeScriptEditor()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Chat System -->
        <div id="chat-toggle" onclick="window.toggleChat(true)">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <div id="unread-badge" class="hidden">0</div>
        </div>

        <div id="chat-window" class="hidden">
            <div class="chat-header">
                <div class="chat-header-title">NETWORK CHAT</div>
                <div class="chat-header-stats">
                    <span><span class="stats-icon">👤</span> <span id="chatOnlineCount">0</span></span>
                    <span><span class="stats-icon">💬</span> <span id="chatMessageCount">0</span></span>
                </div>
            </div>
            
            <div id="pinned-area" class="hidden">
                <span class="pin-icon">📌</span>
                <span class="pin-text" id="pinnedText"></span>
            </div>
            
            <div id="chat-msgs"></div>
            
            <div id="typingIndicator" class="typing-indicator hidden">
                <span id="typingUsers"></span>
                <span class="typing-dots">
                    <span>.</span><span>.</span><span>.</span>
                </span>
            </div>
            
            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="send-chat-btn" onclick="window.sendChat()">SEND</button>
            </div>
            <button onclick="window.toggleChat(false)" class="mini danger close-chat">✕ Close</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="adminFull hidden">
        <!-- Admin content will be dynamically loaded -->
    </div>

    <!-- Feedback UI -->
    <div id="userFeedbackUI" class="panel animate-fade hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;" class="gradient-text">📝 FEEDBACK</h2>
            <button class="mini danger" onclick="window.toggleFeedbackUI(false)">✕ Exit</button>
        </div>
        
        <input id="fb-user" placeholder="Roblox Username">
        <input id="fb-id" placeholder="Roblox UserID">
        <textarea id="fb-msg" placeholder="Write your feedback here..."></textarea>
        <div id="fbCharCount">0/500</div>
        
        <button onclick="window.submitFeedback()">
            <span>Submit Feedback</span>
            <span class="spinner" style="display:none" id="fbSpinner"></span>
        </button>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="script.js"></script>
</body>
</html>
